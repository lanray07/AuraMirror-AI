name: iOS App Store Upload

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "CFBundleVersion to archive"
        required: false
        default: ""
  push:
    tags:
      - "appstore-upload-*"

concurrency:
  group: ios-app-store-upload
  cancel-in-progress: false

jobs:
  archive-and-upload:
    name: Archive and upload AuraMirror AI
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      PROJECT_PATH: AuraMirrorAI.xcodeproj
      SCHEME: AuraMirror AI
      CONFIGURATION: Release
      BUNDLE_ID: com.auramirror.ai
      ARCHIVE_PATH: ${{ github.workspace }}/build/AuraMirrorAI.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      RESULT_BUNDLE_PATH: ${{ github.workspace }}/build/AuraMirrorAI.xcresult
      ASC_KEY_DIR: ${{ github.workspace }}/private_keys
      ASC_KEY_ID_VALUE: ${{ secrets.ASC_KEY_ID || secrets.APP_STORE_CONNECT_KEY_ID || secrets.APP_STORE_CONNECT_API_KEY_ID || secrets.APPSTORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID_VALUE: ${{ secrets.ASC_ISSUER_ID || secrets.APP_STORE_CONNECT_ISSUER_ID || secrets.APP_STORE_CONNECT_API_ISSUER_ID || secrets.APPSTORE_CONNECT_ISSUER_ID }}
      ASC_PRIVATE_KEY_VALUE: ${{ secrets.ASC_PRIVATE_KEY || secrets.APP_STORE_CONNECT_PRIVATE_KEY || secrets.APP_STORE_CONNECT_API_PRIVATE_KEY || secrets.APPSTORE_CONNECT_PRIVATE_KEY }}
      BUILD_NUMBER: ${{ inputs.build_number != '' && inputs.build_number || github.run_number }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Validate required secrets
        run: |
          missing=0
          for name in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ env.ASC_KEY_ID_VALUE }}
          ASC_ISSUER_ID: ${{ env.ASC_ISSUER_ID_VALUE }}
          ASC_PRIVATE_KEY: ${{ env.ASC_PRIVATE_KEY_VALUE }}

      - name: Install App Store Connect API key
        run: |
          mkdir -p "$ASC_KEY_DIR"
          ASC_KEY_PATH="$ASC_KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=$ASC_KEY_PATH" >> "$GITHUB_ENV"
          printf '%s' "$ASC_PRIVATE_KEY" > "$ASC_KEY_PATH"
          chmod 600 "$ASC_KEY_PATH"
        env:
          ASC_KEY_ID: ${{ env.ASC_KEY_ID_VALUE }}
          ASC_PRIVATE_KEY: ${{ env.ASC_PRIVATE_KEY_VALUE }}

      - name: Resolve packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -resultBundlePath "$RESULT_BUNDLE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_COMPILATION_MODE=singlefile \
            SWIFT_OPTIMIZATION_LEVEL=-Onone
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ env.ASC_KEY_ID_VALUE }}
          ASC_ISSUER_ID: ${{ env.ASC_ISSUER_ID_VALUE }}

      - name: Export Xcode diagnostics
        if: failure()
        run: |
          mkdir -p build/diagnostics
          xcrun xcresulttool get --legacy --path "$RESULT_BUNDLE_PATH" --format json > build/diagnostics/xcresult.json || true
          find "$RESULT_BUNDLE_PATH" -type f -maxdepth 3 -print > build/diagnostics/xcresult-files.txt || true

      - name: Create export options
        run: |
          cat > ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
        env:
          ASC_KEY_ID: ${{ env.ASC_KEY_ID_VALUE }}
          ASC_ISSUER_ID: ${{ env.ASC_ISSUER_ID_VALUE }}

      - name: Upload to App Store Connect
        run: |
          ipa="$(find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' -print -quit)"
          if [ -z "$ipa" ]; then
            echo "::error::No IPA was exported."
            exit 1
          fi
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
        env:
          ASC_KEY_ID: ${{ env.ASC_KEY_ID_VALUE }}
          ASC_ISSUER_ID: ${{ env.ASC_ISSUER_ID_VALUE }}
          API_PRIVATE_KEYS_DIR: ${{ github.workspace }}/private_keys

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AuraMirrorAI-ipa
          path: build/export/*.ipa
          if-no-files-found: ignore

      - name: Upload Xcode result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: AuraMirrorAI-xcresult
          path: build/AuraMirrorAI.xcresult
          if-no-files-found: ignore

      - name: Upload Xcode diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: AuraMirrorAI-xcode-diagnostics
          path: build/diagnostics
          if-no-files-found: ignore
